name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - name: Run tests
        run: npm test > /tmp/vitest.log 2>&1 || (tail -25 /tmp/vitest.log && exit 1)
      - run: npm run build
